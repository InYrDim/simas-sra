services:
  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - production

  migrate:
    image: iyedeh/simas-sra-migrate:latest
    profiles:
      - tools
    environment:
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - production

  app:
    image: iyedeh/simas-sra:latest
    restart: always

    environment:
      - DATABASE_URL=mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
    env_file:
      - .env
    volumes:
      - app_files:/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - production

networks:
  production:
    name: simas-production-net
    driver: bridge

volumes:
  db_data:
  app_files:
